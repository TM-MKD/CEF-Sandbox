# Copy this file to .streamlit/secrets.toml and fill in your Microsoft Entra app values.
# Streamlit will use this OIDC provider when st.login("microsoft") is called.

[auth]
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "replace-with-a-random-long-secret"

[auth.microsoft]
client_id = "your-azure-app-client-id"
client_secret = "your-azure-app-client-secret"
server_metadata_url = "https://login.microsoftonline.com/<tenant-id>/v2.0/.well-known/openid-configuration"
client_kwargs = { scope = "openid profile email" }

